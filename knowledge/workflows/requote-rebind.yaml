# Workflow Definition: SGI Requote Rebind
# TierZero uses this to understand when and how to execute this workflow.
# The runbook (knowledge/runbooks/sgi-requote-rebind.md) teaches the RAG.
# This file teaches the workflow engine.

id: requote-rebind
name: SGI Requote Rebind
version: "1.0"

trigger:
  # Ticket characteristics that activate this workflow
  assignment_groups:
    - "DRIVE Alerts - Registration"
    - "DRIVE Alerts"
  keywords:
    - "Bind Failure"
    - "Cannot access payment info"
    - "GW-BIND-4401"
  required_fields:
    - description_contains: "JobNumber"
    - has_json_attachment: true

steps:
  - name: extract-job-number
    type: parse
    source: ticket.description
    pattern: '"JobNumber"\s*:\s*"(\d+)"'
    output: old_job_number

  - name: download-attachment
    type: servicenow-download
    input: ticket.attachment_sys_id
    output: json_file_path

  - name: extract-new-job
    type: parse
    source: json_file_path
    path: "quoteCompositeResponse.responses[0].body.data.attributes.jobNumber"
    output: new_job_number

  - name: query-app-insights
    type: kql
    template: job-to-transaction
    input: old_job_number
    output: registration_transaction_id

  - name: verify-acl-failures
    type: browser-check
    page: acl-command-queue
    filter: { correlation_id: registration_transaction_id }
    expect:
      - SendBoundQuoteToDrive: Failed
      - SendPaymentRequestToInsurCloud: Failed
      - SendPaymentToDrive: Failed

  - name: find-quote-id
    type: browser-search
    page: data-explorer
    stream_type: poc46/registration-transaction
    stream_id: registration_transaction_id
    event: registration-transaction-quotes-set
    extract: "quoteIds[0]"
    output: quote_id

  - name: append-correction
    type: browser-action
    page: data-explorer
    stream_type: poc46/quote
    stream_id: quote_id
    action: append-correction-event
    payload: json_file_path

  - name: manual-bind
    type: browser-action
    page: data-explorer
    action: manually-bind-quote

  - name: wait-bind
    type: browser-poll
    page: acl-command-queue
    command: SendBoundQuoteToDrive
    expect: Completed
    timeout_ms: 180000

  - name: payment-repair
    type: browser-action
    page: payment-repair
    input: new_job_number

  - name: wait-payment
    type: browser-poll
    page: acl-command-queue
    command: SendPaymentToDrive
    exclude: SendFailedPaymentToDrive
    expect: Completed
    timeout_ms: 180000

  - name: update-ticket
    type: servicenow-comment
    message: "requote bound, and payments sent to gwbc"

completion:
  rename_json: "d{old_job_number}.json"
  log_completion: true
